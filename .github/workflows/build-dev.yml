name: Build Development
permissions:
  pull-requests: write
  contents: read

on:
  push:
    branches:
      - "development"
    paths:
      - "eureka/**"
      - ".github/workflows/build-dev.yml"
      - ".github/scripts/build.sh"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Run build script
        run: |
          chmod +x .github/scripts/build.sh
          chmod +x .github/scripts/catsquash
          .github/scripts/build.sh dev

      - name: Upload Pack
        uses: actions/upload-artifact@v6
        with:
          name: "eureka-dev.cats"
          path: "build"

  upload:
    name: Upload
    runs-on: ubuntu-latest
    needs: build
    if: ${{ 'push' == github.event_name && 'development' == github.ref_name  && '1263627741' == github.repository_id }}
    steps:
      - name: Download generated artifact
        uses: actions/download-artifact@v5
        with:
          name: eureka-dev.cats
      - name: "Upload to #development-builds"
        run: |
          zip -r Eureka-dev.cats.zip pack.cats pack.mcmeta
          ls -lahR .
          curl "$WEBHOOK_URL" -X POST -H "Content-type: multipart/form-data" --form "files[0]=@$(echo *.cats.zip)"
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
